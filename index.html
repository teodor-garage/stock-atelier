<title>Stock Atelier</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#F2F4F2">
<style>
  :root {
    --bg: #F2F4F2;
    --panel: #FFFFFF;
    --panel-2: #ECEFEC;
    --panel-3: #E1E5E1;
    --ink: #161A1D;
    --ink-soft: #57626A;
    --ink-dim: #838D93;
    --accent: #C85A1A;
    --accent-ink: #FFFFFF;
    --ok: #1F7A46;
    --ok-bg: #E1F2E7;
    --bad: #B0341C;
    --bad-bg: #FAEAE6;
    --line: rgba(22,26,29,0.10);
    --line-strong: rgba(22,26,29,0.18);
    color-scheme: light;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); }
  body {
    margin: 0;
    color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    overflow-x: hidden;
  }
  .mono { font-family: ui-monospace, "SF Mono", Menlo, "Cascadia Mono", Consolas, monospace; font-variant-numeric: tabular-nums; }

  .wrap { max-width: 560px; margin: 0 auto; padding: 0 16px calc(40px + env(safe-area-inset-bottom)) 16px; position: relative; }

  /* ---- header / brand ---- */
  header {
    position: relative;
    padding: calc(20px + env(safe-area-inset-top)) 0 18px 0;
    background:
      radial-gradient(circle at 18px 18px, rgba(22,26,29,0.06) 1px, transparent 1.6px) 0 0/22px 22px,
      var(--bg);
    border-bottom: 1px solid var(--line);
    margin-bottom: 18px;
  }
  header::after {
    content: "";
    position: absolute; left: 0; right: 0; bottom: -1px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent) 18%, var(--accent) 82%, transparent);
    opacity: 0.55;
  }
  .brand { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; padding: 0 16px; }
  .brand-mark { display: flex; align-items: baseline; gap: 8px; }
  .brand-mark .lg {
    font-size: 21px; font-weight: 800; letter-spacing: -0.01em;
  }
  .brand-mark .sm {
    font-size: 11px; font-weight: 700; letter-spacing: 0.14em; text-transform: uppercase; color: var(--ink-dim);
  }
  .brand-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 8px var(--accent); flex: none; }
  .clock { font-size: 11px; color: var(--ink-dim); }

  .stat-strip {
    display: flex; gap: 0; margin: 16px 16px 0 16px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px; overflow: hidden;
  }
  .stat-strip .cell { flex: 1; padding: 12px 14px; }
  .stat-strip .cell + .cell { border-left: 1px solid var(--line); }
  .stat-strip .n { font-size: 20px; font-weight: 800; }
  .stat-strip .l { font-size: 10.5px; font-weight: 700; letter-spacing: 0.07em; text-transform: uppercase; color: var(--ink-dim); margin-top: 2px; }

  /* ---- search ---- */
  .search-shell {
    display: flex; align-items: center;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 13px; margin: 14px 16px 0 16px;
  }
  .search-shell.focus { border-color: var(--accent); }
  .search-shell svg { flex: none; margin-left: 14px; color: var(--ink-dim); }
  .search-shell input {
    flex: 1; border: 0; background: transparent; outline: none;
    padding: 14px 12px; font-size: 16px; font-weight: 600; color: var(--ink);
    font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace; text-transform: uppercase;
  }
  .search-shell input::placeholder { color: var(--ink-dim); font-weight: 500; text-transform: none; font-family: inherit; }
  .clear-btn {
    display: none; border: 0; background: var(--panel-3); color: var(--ink-soft);
    width: 24px; height: 24px; border-radius: 50%; margin-right: 8px; font-size: 13px; cursor: pointer; flex: none;
  }

  main { padding-top: 20px; }

  /* ---- category grid ---- */
  .section-label {
    font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-dim); margin: 0 2px 10px 2px; display: flex; align-items: center; gap: 8px;
  }
  .section-label::after { content: ""; flex: 1; height: 1px; background: var(--line); }

  .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .cat-card {
    position: relative;
    background: var(--panel); border: 1px solid var(--line); border-radius: 16px;
    padding: 16px; cursor: pointer; text-align: left; overflow: hidden;
    display: flex; flex-direction: column; gap: 20px; min-height: 128px;
  }
  .cat-card:active { background: var(--panel-2); border-color: var(--line-strong); }
  .cat-card .icon {
    width: 34px; height: 34px; border-radius: 10px; background: var(--panel-3);
    display: flex; align-items: center; justify-content: center; color: var(--accent);
  }
  .cat-card .name { font-size: 14.5px; font-weight: 800; letter-spacing: -0.005em; line-height: 1.2; }
  .cat-card .meta { display: flex; gap: 10px; font-size: 11px; color: var(--ink-dim); }
  .cat-card .meta b { color: var(--ink-soft); font-family: ui-monospace, monospace; }
  .cat-card .stripe {
    position: absolute; top: 0; right: 0; width: 30px; height: 30px;
    background: repeating-linear-gradient(-45deg, var(--accent) 0 3px, transparent 3px 7px);
    opacity: 0.35; border-radius: 0 16px 0 16px;
  }
  .cat-card.add-new {
    align-items: center; justify-content: center; flex-direction: row; gap: 8px;
    border-style: dashed; border-color: var(--line-strong); color: var(--ink-soft); min-height: 72px;
  }
  .cat-card.add-new span { font-size: 13px; font-weight: 700; }

  /* ---- category detail ---- */
  .cat-header { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
  .back-btn {
    flex: none; width: 34px; height: 34px; border-radius: 10px; border: 1px solid var(--line);
    background: var(--panel); color: var(--ink); display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .back-btn:active { background: var(--panel-2); }
  .cat-header .icon2 {
    width: 34px; height: 34px; border-radius: 10px; background: var(--panel-3); color: var(--accent);
    display: flex; align-items: center; justify-content: center; flex: none;
  }
  .cat-header .titles { min-width: 0; }
  .cat-header h1 { margin: 0; font-size: 18px; font-weight: 800; letter-spacing: -0.01em; text-wrap: balance; }
  .cat-header .sub { font-size: 11.5px; color: var(--ink-dim); margin-top: 1px; }

  h1.home-title { font-size: 20px; font-weight: 800; margin: 0 2px 2px 2px; letter-spacing: -0.01em; }
  p.home-sub { font-size: 12.5px; color: var(--ink-dim); margin: 0 2px 16px 2px; }

  /* ---- rows ---- */
  .row-list { display: flex; flex-direction: column; gap: 8px; }
  .row-card {
    display: flex; align-items: center; gap: 10px;
    background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 11px 12px;
  }
  .row-main { flex: 1; min-width: 0; cursor: pointer; }
  .row-ref { font-weight: 700; font-size: 14.5px; word-break: break-word; }
  .row-cat { font-size: 11px; color: var(--ink-dim); margin-top: 2px; }
  .row-status { flex: none; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .dot { width: 7px; height: 7px; border-radius: 50%; flex: none; }
  .dot.ok { background: var(--ok); box-shadow: 0 0 6px var(--ok); }
  .dot.bad { background: var(--bad); }
  .row-steppers { display: flex; align-items: center; gap: 6px; flex: none; }
  .step {
    width: 34px; height: 34px; border-radius: 9px; border: 1px solid var(--line);
    background: var(--panel-2); color: var(--ink); font-size: 17px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; cursor: pointer; touch-action: manipulation;
  }
  .step:active { transform: scale(0.92); background: var(--panel-3); }
  .row-qty { width: 26px; text-align: center; font-size: 15px; font-weight: 800; }

  @media (max-width: 380px) {
    .cat-grid { gap: 8px; }
    .cat-card { padding: 13px; min-height: 116px; gap: 16px; }
    .cat-card .name { font-size: 13.5px; }
    .stat-strip .cell { padding: 10px 8px; }
    .stat-strip .n { font-size: 17px; }
    .hero-ref { font-size: 19px; }
    .qty-num { font-size: 28px; }
  }

  /* ---- hero (search match) ---- */
  .hero-card {
    background: var(--panel); border: 1px solid var(--line); border-radius: 18px; padding: 20px;
    margin-bottom: 14px; animation: rise 0.2s ease;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  .hero-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
  .hero-ref { font-size: 22px; font-weight: 800; letter-spacing: -0.01em; word-break: break-word; }
  .tag {
    display: inline-block; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
    color: var(--ink-soft); background: var(--panel-3); border-radius: 999px; padding: 3px 9px; margin-top: 7px;
  }
  .pill {
    flex: none; font-size: 11px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase;
    padding: 6px 10px; border-radius: 999px; display: flex; align-items: center; gap: 6px; white-space: nowrap;
  }
  .pill.ok { background: var(--ok-bg); color: var(--ok); }
  .pill.bad { background: var(--bad-bg); color: var(--bad); }

  .qty-row { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--line); }
  .qty-label { font-size: 11.5px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-dim); }
  .qty-controls { display: flex; align-items: center; gap: 16px; }
  .qty-num { font-size: 32px; font-weight: 800; min-width: 2.2ch; text-align: center; }
  .qty-num.ok { color: var(--ok); }
  .qty-num.bad { color: var(--bad); }
  .stepper {
    width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--line); background: var(--panel-2);
    color: var(--ink); font-size: 20px; font-weight: 700; cursor: pointer;
    display: flex; align-items: center; justify-content: center; touch-action: manipulation;
  }
  .stepper:active { transform: scale(0.94); background: var(--panel-3); }
  .hero-actions { display: flex; gap: 16px; margin-top: 14px; }
  .link-btn { border: 0; background: none; color: var(--ink-dim); font-size: 12px; font-weight: 700; letter-spacing: 0.03em; padding: 6px 2px; cursor: pointer; }
  .link-btn.danger { color: var(--bad); }

  .group-title { font-size: 11px; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; color: var(--ink-dim); margin: 20px 2px 8px 2px; }
  .group-title:first-child { margin-top: 4px; }

  .empty { text-align: center; padding: 44px 20px; color: var(--ink-dim); }
  .empty .big { font-size: 32px; margin-bottom: 10px; }
  .empty p { font-size: 13.5px; line-height: 1.5; margin: 4px 0; }

  .fab {
    position: fixed; right: max(20px, calc(50vw - 280px + 20px)); bottom: calc(22px + env(safe-area-inset-bottom));
    width: 56px; height: 56px; border-radius: 50%; background: var(--accent); color: var(--accent-ink);
    border: 0; font-size: 27px; box-shadow: 0 10px 26px -8px rgba(255,122,26,0.55); cursor: pointer; z-index: 20;
    display: flex; align-items: center; justify-content: center;
  }
  .fab:active { transform: scale(0.94); }

  .backdrop { position: fixed; inset: 0; background: rgba(6,8,10,0.6); display: none; align-items: flex-end; justify-content: center; z-index: 30; }
  .backdrop.open { display: flex; }
  .sheet { width: 100%; max-width: 560px; background: var(--panel); border: 1px solid var(--line); border-bottom: none; border-radius: 20px 20px 0 0; padding: 20px 20px calc(20px + env(safe-area-inset-bottom)) 20px; }
  .sheet h2 { margin: 0 0 16px 0; font-size: 16.5px; font-weight: 800; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 6px; }
  .field input {
    width: 100%; border: 1px solid var(--line); background: var(--panel-2); border-radius: 10px;
    padding: 12px; font-size: 16px; color: var(--ink); outline: none; font-family: inherit;
  }
  .field input:focus { border-color: var(--accent); }
  .sheet-actions { display: flex; gap: 10px; margin-top: 18px; }
  button.primary { flex: 1; border: 0; background: var(--accent); color: var(--accent-ink); font-size: 15px; font-weight: 800; padding: 14px; border-radius: 12px; cursor: pointer; }
  button.primary:active { transform: scale(0.98); }
  button.secondary { border: 0; background: var(--panel-2); color: var(--ink); font-size: 15px; font-weight: 700; padding: 14px 18px; border-radius: 12px; cursor: pointer; }
  button:focus-visible, input:focus-visible, [tabindex]:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  .toast {
    position: fixed; left: 50%; bottom: calc(100px + env(safe-area-inset-bottom)); transform: translate(-50%, 12px);
    background: var(--ink); color: var(--bg); padding: 10px 16px; border-radius: 999px; font-size: 13px; font-weight: 700;
    opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease; z-index: 40; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  footer { text-align: center; padding: 22px 0 4px 0; color: var(--ink-dim); font-size: 11px; }
  footer button { background: none; border: 0; color: var(--ink-dim); font-size: 11px; text-decoration: underline; cursor: pointer; padding: 0; }

  @media (prefers-reduced-motion: reduce) { .hero-card, .step, .stepper, .fab, button { animation: none !important; transition: none !important; } }
</style>

<header>
  <div class="brand">
    <div class="brand-mark">
      <span class="brand-dot"></span>
      <span class="lg">Stock<span style="color:var(--ink-dim)">.</span>Atelier</span>
    </div>
    <span class="clock mono" id="clock"></span>
  </div>
  <div class="stat-strip">
    <div class="cell"><div class="n mono" id="statCats">0</div><div class="l">Catégories</div></div>
    <div class="cell"><div class="n mono" id="statRefs">0</div><div class="l">Références</div></div>
    <div class="cell"><div class="n mono" id="statPieces">0</div><div class="l">Pièces</div></div>
  </div>
  <div class="search-shell" id="searchShell">
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
    <input id="search" type="text" placeholder="Chercher une référence, toutes catégories…" autocomplete="off" autocapitalize="characters" spellcheck="false" inputmode="search">
    <button class="clear-btn" id="clearBtn" aria-label="Effacer">✕</button>
  </div>
</header>

<div class="wrap">
  <main id="main"></main>
  <footer><span id="footNote"></span> · <button id="exportBtn">exporter une sauvegarde</button></footer>
</div>

<button class="fab" id="addFab" aria-label="Ajouter une référence">+</button>

<div class="backdrop" id="backdrop">
  <div class="sheet">
    <h2 id="sheetTitle">Ajouter une référence</h2>
    <div class="field"><label for="fRef">Référence</label><input id="fRef" type="text" autocapitalize="characters" spellcheck="false" placeholder="ex : FC128x2"></div>
    <div class="field"><label for="fCat">Catégorie</label><input id="fCat" type="text" list="catList" placeholder="ex : Filtre habitacle"><datalist id="catList"></datalist></div>
    <div class="field"><label for="fQty">Quantité en stock</label><input id="fQty" type="number" inputmode="numeric" min="0" step="1" placeholder="0"></div>
    <div class="sheet-actions"><button class="secondary" id="sheetCancel">Annuler</button><button class="primary" id="sheetSave">Enregistrer</button></div>
  </div>
</div>

<div class="toast" id="toast"></div>

  function iconFor(cat) {
    var c = (cat || "").toLowerCase();
    if (c.indexOf("huile") !== -1) return ICONS.huile;
    if (c.indexOf("frein") !== -1 || c.indexOf("disque") !== -1 || c.indexOf("plaquette") !== -1) return ICONS.frein;

  // ---------- storage ----------
  function loadStore() {
    var raw;
    try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) { raw = null; }
    var store;
    if (raw) { try { store = JSON.parse(raw); } catch (e) { store = null; } }
    if (!store || !Array.isArray(store.items)) store = { baseVersion: 0, items: [] };
    if (store.baseVersion < BASE_VERSION) {
      var existingRefs = {};
      store.items.forEach(function (it) { existingRefs[normalize(it.ref)] = true; });
      BASE_DATA.forEach(function (it) {
        if (!existingRefs[normalize(it.ref)]) store.items.push({ ref: it.ref, category: it.category, qty: it.qty, id: makeId() });
      });
      store.baseVersion = BASE_VERSION;
      saveStore(store);
    }
    store.items.forEach(function (it) { if (!it.id) it.id = makeId(); });
    return store;
  }
  function saveStore(store) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); } catch (e) {} }
  function makeId() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }
  function normalize(s) { return (s || "").toString().toLowerCase().replace(/[\s\-\/_.]/g, ""); }
  function escapeHtml(s) {
    return (s || "").toString().replace(/[&<>"']/g, function (c) { return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]; });
  }

  function toast(msg) {
    toastEl.textContent = msg; toastEl.classList.add("show");

  }

  function tickClock() {
    var d = new Date();
    var p = function (n) { return (n < 10 ? "0" : "") + n; };
    document.getElementById("clock").textContent = p(d.getHours()) + ":" + p(d.getMinutes());
  }
  tickClock(); setInterval(tickClock, 15000);

  function categoriesData() {
    var map = {};
    store.items.forEach(function (it) {
      var c = it.category || "Sans catégorie";
      if (!map[c]) map[c] = { name: c, refs: 0, pieces: 0 };
      map[c].refs += 1; map[c].pieces += Number(it.qty) || 0;
    });
    return Object.keys(map).sort().map(function (k) { return map[k]; });
  }

  function updateStats() {
    var cats = categoriesData();
    var pieces = store.items.reduce(function (s, it) { return s + (Number(it.qty) || 0); }, 0);
    statCats.textContent = cats.length;
    statRefs.textContent = store.items.length;
    statPieces.textContent = pieces;
  }

  function refreshCatList() {
    var cats = {}; store.items.forEach(function (it) { if (it.category) cats[it.category] = true; });
    catList.innerHTML = Object.keys(cats).sort().map(function (c) { return '<option value="' + escapeHtml(c) + '"></option>'; }).join("");
  }

  // ---------- render router ----------
  function render() {
    updateStats();
    var q = searchEl.value.trim();
    clearBtn.style.display = q ? "flex" : "none";

    if (q) { renderSearchResults(q); return; }
    if (view.mode === "category" && view.category) { renderCategory(view.category); return; }
    renderHome();
  }

  function renderHome() {
    var cats = categoriesData();
    var html = '<h1 class="home-title">Catalogue pièces</h1><p class="home-sub">Choisis une catégorie ou cherche directement une référence.</p>';
    if (cats.length === 0) {
      html += '<div class="empty"><div class="big">🧰</div><p><strong>Aucune pièce enregistrée</strong></p><p>Ajoute ta première référence avec le bouton +.</p></div>';
      mainEl.innerHTML = html;
      return;
    }
    html += '<div class="cat-grid">';
    cats.forEach(function (c) {
      html +=
        '<button class="cat-card" data-cat="' + escapeHtml(c.name) + '">' +
          '<div class="stripe"></div>' +
          '<div class="icon">' + iconFor(c.name) + "</div>" +
          '<div><div class="name">' + escapeHtml(c.name) + "</div>" +
          '<div class="meta"><span><b class="mono">' + c.refs + "</b> réf.</span><span><b class=\"mono\">" + c.pieces + "</b> pièces</span></div></div>" +
        "</button>";
    });
    html += '<button class="cat-card add-new" id="addCatCard"><span style="font-size:18px;line-height:1">+</span><span>Nouvelle catégorie</span></button>';
    html += "</div>";
    mainEl.innerHTML = html;
    mainEl.querySelectorAll(".cat-card[data-cat]").forEach(function (el) {
      el.addEventListener("click", function () { view.mode = "category"; view.category = el.getAttribute("data-cat"); render(); window.scrollTo({ top: 0 }); });
    });
    var addCat = document.getElementById("addCatCard");
    if (addCat) addCat.addEventListener("click", function () { openSheet(null, "", ""); });
  }

  function renderCategory(catName) {
    var items = store.items.filter(function (it) { return (it.category || "Sans catégorie") === catName; })
      .sort(function (a, b) { return a.ref.localeCompare(b.ref); });
    var pieces = items.reduce(function (s, it) { return s + (Number(it.qty) || 0); }, 0);

    var html =
      '<div class="cat-header">' +
        '<button class="back-btn" id="backBtn" aria-label="Retour">' +
          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"></path></svg>' +
        "</button>" +
        '<div class="icon2">' + iconFor(catName) + "</div>" +
        '<div class="titles"><h1>' + escapeHtml(catName) + "</h1>" +
        '<div class="sub">' + items.length + " référence" + (items.length > 1 ? "s" : "") + " · " + pieces + " pièces en stock</div></div>" +
      "</div>";

    if (items.length === 0) {
      html += '<div class="empty"><div class="big">📭</div><p>Aucune référence dans cette catégorie.</p></div>';
      mainEl.innerHTML = html;

    html += '<div class="row-list">';

  function bindCategoryNav() {
    var b = document.getElementById("backBtn");
    if (b) b.addEventListener("click", function () { view.mode = "home"; view.category = null; render(); window.scrollTo({ top: 0 }); });
  }

  function renderSearchResults(q) {
    var nq = normalize(q);
    var matches = store.items.filter(function (it) { return normalize(it.ref).indexOf(nq) !== -1; });
    matches.sort(function (a, b) {
      var an = normalize(a.ref), bn = normalize(b.ref);
      var ae = an === nq ? 0 : an.indexOf(nq) === 0 ? 1 : 2;
      var be = bn === nq ? 0 : bn.indexOf(nq) === 0 ? 1 : 2;
      if (ae !== be) return ae - be;
      return a.ref.localeCompare(b.ref);
    });

    if (matches.length === 0) {
      mainEl.innerHTML = '<div class="empty"><div class="big">🔍</div><p><strong>Référence inconnue</strong></p><p>Aucune pièce ne correspond à «' + escapeHtml(q) + '».</p></div>';
      var addBtn = document.createElement("button");
      addBtn.className = "primary"; addBtn.style.cssText = "display:block;margin:14px auto 0 auto;max-width:260px;";
      addBtn.textContent = "Ajouter « " + q + " »";
      addBtn.addEventListener("click", function () { openSheet(null, q, view.category || ""); });
      mainEl.querySelector(".empty").appendChild(addBtn);
      return;
    }

    var html = heroCardHtml(matches[0]);
    if (matches.length > 1) {
      html += '<div class="group-title">Autres résultats</div><div class="row-list">';
      matches.slice(1).forEach(function (it) { html += rowHtml(it); });
      html += "</div>";
    }
    mainEl.innerHTML = html;
    bindHeroActions(matches[0].id);
    bindRowSteppers();
    bindRowOpen();
  }

  function rowHtml(it) {
    var ok = Number(it.qty) > 0;
    return (
      '<div class="row-card" data-id="' + it.id + '">' +
        '<div class="row-main" data-open="' + it.id + '">' +
          '<div class="row-ref mono">' + escapeHtml(it.ref) + "</div>" +

        "</div>" +
        '<div class="row-steppers">' +
          '<button class="step" data-delta="-1" data-id="' + it.id + '" aria-label="Retirer une pièce">–</button>' +
          '<span class="row-qty mono" data-qty="' + it.id + '" style="color:' + (ok ? "var(--ok)" : "var(--bad)") + '">' + it.qty + "</span>" +
          '<button class="step" data-delta="1" data-id="' + it.id + '" aria-label="Ajouter une pièce">+</button>' +
        "</div>" +
      "</div>"
    );
  }

  function heroCardHtml(it) {
    var ok = Number(it.qty) > 0;
    return (
      '<div class="hero-card" data-id="' + it.id + '">' +
        '<div class="hero-top">' +
          '<div><div class="hero-ref mono">' + escapeHtml(it.ref) + "</div>" +
          '<span class="tag">' + escapeHtml(it.category || "Sans catégorie") + "</span></div>" +
          '<span class="pill ' + (ok ? "ok" : "bad") + '"><span class="dot ' + (ok ? "ok" : "bad") + '"></span>' + (ok ? "Disponible" : "Indisponible") + "</span>" +
        "</div>" +

            '<button class="stepper" id="heroPlus" aria-label="Ajouter une pièce">+</button>' +

  function bindRowOpen() {
    mainEl.querySelectorAll("[data-open]").forEach(function (el) {
      el.addEventListener("click", function () {
        var it = store.items.find(function (x) { return x.id === el.getAttribute("data-open"); });
        if (it) openSheet(it.id);
      });
    });
  }

  function bindRowSteppers() {
    mainEl.querySelectorAll(".step").forEach(function (el) {
      el.addEventListener("click", function (e) {
        e.stopPropagation();
        var id = el.getAttribute("data-id"); var delta = parseInt(el.getAttribute("data-delta"), 10);
        var it = store.items.find(function (x) { return x.id === id; });
        if (!it) return;
        it.qty = Math.max(0, (Number(it.qty) || 0) + delta);
        saveStore(store);
        var span = mainEl.querySelector('[data-qty="' + id + '"]');
        if (span) { span.textContent = it.qty; span.style.color = it.qty > 0 ? "var(--ok)" : "var(--bad)"; }
        updateStats();
      });
    });
  }

  function bindHeroActions(id) {
    var it = store.items.find(function (x) { return x.id === id; });
    if (!it) return;
    document.getElementById("heroMinus").addEventListener("click", function () { it.qty = Math.max(0, (Number(it.qty) || 0) - 1); saveStore(store); render(); });
    document.getElementById("heroPlus").addEventListener("click", function () { it.qty = (Number(it.qty) || 0) + 1; saveStore(store); render(); });
    document.getElementById("heroEdit").addEventListener("click", function () { openSheet(it.id); });
    document.getElementById("heroDelete").addEventListener("click", function () {
      if (!confirm("Supprimer la référence « " + it.ref + " » ?")) return;
      store.items = store.items.filter(function (x) { return x.id !== it.id; });
      saveStore(store); searchEl.value = ""; toast("Référence supprimée"); render();
    });
  }

  // ---------- add / edit sheet ----------
  function openSheet(id, prefillRef, prefillCat) {
    editingId = id;
    refreshCatList();
    if (id) {
      var it = store.items.find(function (x) { return x.id === id; });
      sheetTitle.textContent = "Modifier la référence";
      fRef.value = it.ref; fCat.value = it.category || ""; fQty.value = it.qty;
    } else {
      sheetTitle.textContent = "Ajouter une référence";
      fRef.value = prefillRef || ""; fCat.value = prefillCat || (view.mode === "category" ? view.category : ""); fQty.value = "";
    }
    backdrop.classList.add("open");
    setTimeout(function () { (id ? fQty : fRef).focus(); }, 50);
  }
  function closeSheet() { backdrop.classList.remove("open"); editingId = null; }

  document.getElementById("addFab").addEventListener("click", function () { openSheet(null); });
  document.getElementById("sheetCancel").addEventListener("click", closeSheet);
  backdrop.addEventListener("click", function (e) { if (e.target === backdrop) closeSheet(); });

  document.getElementById("sheetSave").addEventListener("click", function () {
    var ref = fRef.value.trim(); var cat = fCat.value.trim(); var qty = Math.max(0, parseInt(fQty.value, 10) || 0);
    if (!ref) { fRef.focus(); toast("Indique une référence"); return; }
    if (editingId) {
      var it = store.items.find(function (x) { return x.id === editingId; });
      it.ref = ref; it.category = cat; it.qty = qty;
      toast("Référence mise à jour");
    } else {
      var dup = store.items.find(function (x) { return normalize(x.ref) === normalize(ref); });
      if (dup) { toast("Cette référence existe déjà"); return; }
      store.items.push({ id: makeId(), ref: ref, category: cat, qty: qty });
      toast("Référence ajoutée");
    }
    saveStore(store); closeSheet();
    if (searchEl.value) searchEl.value = ref; else { view.mode = "category"; view.category = cat || "Sans catégorie"; }
    render();
  });

  // ---------- search wiring ----------
  searchEl.addEventListener("input", render);
  searchEl.addEventListener("focus", function () { searchShell.classList.add("focus"); });
  searchEl.addEventListener("blur", function () { searchShell.classList.remove("focus"); });
  clearBtn.addEventListener("click", function () { searchEl.value = ""; render(); searchEl.focus(); });
  searchEl.addEventListener("keydown", function (e) { if (e.key === "Escape") { searchEl.value = ""; render(); searchEl.blur(); } });

  // ---------- export backup ----------
  document.getElementById("exportBtn").addEventListener("click", function () {
    var data = JSON.stringify({ exportedAt: new Date().toISOString(), items: store.items }, null, 2);
    if (window.claude && window.claude.downloads) {
      window.claude.downloads.save({ filename: "stock-pieces-sauvegarde.json", data: data }).then(function () { toast("Sauvegarde enregistrée"); }).catch(function () { toast("Export annulé"); });
    } else {
      var blob = new Blob([data], { type: "application/json" });
      var url = URL.createObjectURL(blob);
      var a = document.createElement("a"); a.href = url; a.download = "stock-pieces-sauvegarde.json";
      document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }
  });

  document.getElementById("footNote").textContent = store.items.length + " réf. enregistrées sur cet appareil";

  render();
})();
</script>
